<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Data Analysis</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0e17;
        color: #c8d6e5;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    header {
        background: #111827;
        border-bottom: 1px solid #1e293b;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
    }
    header h1 {
        font-size: 18px;
        font-weight: 600;
        color: #e2e8f0;
        white-space: nowrap;
    }
    .header-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }
    .btn {
        padding: 6px 16px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
    }
    .btn-primary {
        background: #3b82f6;
        color: #fff;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e3a5f; color: #64748b; cursor: default; }
    .file-info {
        font-size: 13px;
        color: #64748b;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .file-info strong { color: #94a3b8; }
    #fileInput { display: none; }

    .tab-bar {
        background: #111827;
        border-bottom: 1px solid #1e293b;
        display: flex;
        gap: 2px;
        padding: 0 16px;
        flex-shrink: 0;
        overflow-x: auto;
    }
    .tab-btn {
        padding: 8px 16px;
        background: transparent;
        border: none;
        color: #64748b;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        white-space: nowrap;
    }
    .tab-btn:hover { color: #94a3b8; }
    .tab-btn.active {
        color: #3b82f6;
        border-bottom-color: #3b82f6;
    }

    .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }

    .drop-zone {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #475569;
    }
    .drop-zone.drag-over {
        background: rgba(59, 130, 246, 0.05);
        border: 2px dashed #3b82f6;
    }
    .drop-icon {
        font-size: 48px;
        opacity: 0.3;
    }
    .drop-text {
        font-size: 16px;
        font-weight: 500;
    }
    .drop-sub {
        font-size: 13px;
        color: #334155;
    }

    .plot-area {
        flex: 1;
        display: none;
        min-height: 0;
        overflow: hidden;
    }

    .stats-bar {
        background: #111827;
        border-top: 1px solid #1e293b;
        padding: 6px 20px;
        display: none;
        gap: 24px;
        font-size: 12px;
        color: #64748b;
        flex-shrink: 0;
        flex-wrap: wrap;
    }
    .stats-bar.visible { display: flex; }
    .stat-item strong {
        color: #94a3b8;
        margin-right: 4px;
    }
</style>
</head>
<body>

<header>
    <h1>Flight Data Analysis</h1>
    <div class="header-controls">
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Open CSV</button>
        <input type="file" id="fileInput" accept=".csv,.txt" onchange="handleFile(event)">
        <span class="file-info" id="fileInfo">No file loaded</span>
    </div>
</header>

<div class="tab-bar" id="tabBar" style="display:none;"></div>

<div class="content" id="content">
    <div class="drop-zone" id="dropZone">
        <div class="drop-icon">&#x1F4C1;</div>
        <div class="drop-text">Drop a CSV file here or click Open CSV</div>
        <div class="drop-sub">Expected format: timestamp_ms, accel, gyro, quaternion, pressure, temperature, altitude</div>
    </div>
    <div class="plot-area" id="plotContainer"></div>
</div>

<div class="stats-bar" id="statsBar"></div>

<script>
// ── View Definitions ──
const VIEWS = [
    {
        id: 'accelerometer',
        label: 'Accelerometer',
        fields: [
            { key: 'accel_x', name: 'X', color: '#ef4444' },
            { key: 'accel_y', name: 'Y', color: '#22c55e' },
            { key: 'accel_z', name: 'Z', color: '#3b82f6' }
        ],
        yLabel: 'Acceleration (m/s²)'
    },
    {
        id: 'gyroscope',
        label: 'Gyroscope',
        fields: [
            { key: 'gyro_x', name: 'X', color: '#ef4444' },
            { key: 'gyro_y', name: 'Y', color: '#22c55e' },
            { key: 'gyro_z', name: 'Z', color: '#3b82f6' }
        ],
        yLabel: 'Angular Rate (deg/s)'
    },
    {
        id: 'quaternion',
        label: 'Quaternion',
        fields: [
            { key: 'quat_w', name: 'W', color: '#f59e0b' },
            { key: 'quat_x', name: 'X', color: '#ef4444' },
            { key: 'quat_y', name: 'Y', color: '#22c55e' },
            { key: 'quat_z', name: 'Z', color: '#3b82f6' }
        ],
        yLabel: 'Quaternion Component'
    },
    {
        id: 'pressure',
        label: 'Pressure',
        fields: [
            { key: 'pressure_pa', name: 'Pressure', color: '#a78bfa' }
        ],
        yLabel: 'Pressure (Pa)'
    },
    {
        id: 'temperature',
        label: 'Temperature',
        fields: [
            { key: 'temperature_c', name: 'Temperature', color: '#fb923c' }
        ],
        yLabel: 'Temperature (°C)'
    },
    {
        id: 'altitude',
        label: 'Altitude',
        fields: [
            { key: 'altitude_m', name: 'Altitude', color: '#5ce0d2' }
        ],
        yLabel: 'Altitude (m)'
    }
];

let flightData = null;
let currentView = VIEWS[0].id;
let availableViews = [];

// ── CSV Parsing ──
function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) throw new Error('CSV must have a header row and at least one data row');

    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    const data = [];

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const vals = line.split(',');
        const row = {};
        for (let j = 0; j < headers.length; j++) {
            row[headers[j]] = parseFloat(vals[j]);
        }
        if (!isNaN(row.timestamp_ms)) {
            data.push(row);
        }
    }

    if (data.length === 0) throw new Error('No valid data rows found');

    // Sort by timestamp
    data.sort((a, b) => a.timestamp_ms - b.timestamp_ms);

    // Compute time in seconds from start
    const t0 = data[0].timestamp_ms;
    for (const row of data) {
        row._time_s = (row.timestamp_ms - t0) / 1000;
    }

    return { headers, data };
}

// ── File Handling ──
function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    loadFile(file);
}

function loadFile(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = parseCSV(e.target.result);
            flightData = result;
            onDataLoaded(file.name, result);
        } catch (err) {
            alert('Error parsing CSV: ' + err.message);
        }
    };
    reader.readAsText(file);
}

function onDataLoaded(filename, result) {
    // Update file info
    const duration = result.data[result.data.length - 1]._time_s;
    document.getElementById('fileInfo').innerHTML =
        `<strong>${filename}</strong> &mdash; ${result.data.length.toLocaleString()} samples, ${duration.toFixed(2)}s`;

    // Determine which views have data
    availableViews = VIEWS.filter(v =>
        v.fields.some(f => result.headers.includes(f.key))
    );

    if (availableViews.length === 0) {
        alert('No recognized data columns found in CSV.');
        return;
    }

    // Show tabs and plot
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('plotContainer').style.display = 'block';
    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('statsBar').classList.add('visible');

    currentView = availableViews[0].id;
    renderTabs();
    // Delay render to let display:block take effect in layout
    requestAnimationFrame(() => requestAnimationFrame(() => renderView()));
}

// ── Tab Rendering ──
function renderTabs() {
    const bar = document.getElementById('tabBar');
    bar.innerHTML = '';
    for (const view of availableViews) {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (view.id === currentView ? ' active' : '');
        btn.textContent = view.label;
        btn.onclick = () => {
            currentView = view.id;
            renderTabs();
            renderView();
        };
        bar.appendChild(btn);
    }
}

// ── Plotting ──
const MAX_PLOT_POINTS = 80000;

function downsample(arr, maxPts) {
    if (arr.length <= maxPts) return arr;
    const step = arr.length / maxPts;
    const out = [];
    for (let i = 0; i < maxPts; i++) {
        out.push(arr[Math.floor(i * step)]);
    }
    // Always include last point
    if (out[out.length - 1] !== arr[arr.length - 1]) {
        out.push(arr[arr.length - 1]);
    }
    return out;
}

function renderView() {
    const view = availableViews.find(v => v.id === currentView);
    if (!view || !flightData) return;

    const data = flightData.data;
    const perTrace = Math.floor(MAX_PLOT_POINTS / view.fields.length);
    const sampled = downsample(data, perTrace);
    const timeArr = sampled.map(d => d._time_s);

    const traces = [];
    for (const f of view.fields) {
        if (!flightData.headers.includes(f.key)) continue;
        traces.push({
            x: timeArr,
            y: sampled.map(d => d[f.key]),
            type: 'scatter',
            mode: 'lines',
            name: f.name,
            line: { color: f.color, width: 1.5 }
        });
    }

    const container = document.getElementById('plotContainer');
    Plotly.purge(container);

    // Calculate available space
    const rect = container.getBoundingClientRect();
    const w = rect.width || window.innerWidth;
    const h = rect.height || (window.innerHeight - container.getBoundingClientRect().top - 40);
    container.style.width = w + 'px';
    container.style.height = h + 'px';

    const layout = {
        width: w,
        height: h,
        paper_bgcolor: '#0a0e17',
        plot_bgcolor: '#0a0e17',
        font: { color: '#94a3b8', size: 12 },
        margin: { t: 24, r: 24, b: 48, l: 64 },
        xaxis: {
            title: 'Time (s)',
            gridcolor: '#1e293b',
            zerolinecolor: '#334155',
            tickcolor: '#475569'
        },
        yaxis: {
            title: view.yLabel,
            gridcolor: '#1e293b',
            zerolinecolor: '#334155',
            tickcolor: '#475569'
        },
        legend: {
            bgcolor: 'rgba(17,24,39,0.8)',
            bordercolor: '#1e293b',
            borderwidth: 1,
            font: { size: 12 }
        },
        hovermode: 'x unified'
    };

    const config = {
        responsive: true,
        displaylogo: false,
        modeBarButtonsToRemove: ['lasso2d', 'select2d']
    };

    Plotly.newPlot(container, traces, layout, config);
    updateStats(view, data);
}

// ── Stats ──
function updateStats(view, data) {
    const bar = document.getElementById('statsBar');
    const parts = [];

    for (const f of view.fields) {
        if (!flightData.headers.includes(f.key)) continue;
        let min = Infinity, max = -Infinity, sum = 0, count = 0;
        for (const row of data) {
            const v = row[f.key];
            if (isNaN(v)) continue;
            if (v < min) min = v;
            if (v > max) max = v;
            sum += v;
            count++;
        }
        const mean = count > 0 ? sum / count : 0;
        parts.push(`<span class="stat-item"><strong>${f.name}:</strong> min ${min.toFixed(3)} &middot; max ${max.toFixed(3)} &middot; mean ${mean.toFixed(3)}</span>`);
    }

    bar.innerHTML = parts.join('');
}

// ── Drag & Drop ──
const dropZone = document.getElementById('dropZone');
const content = document.getElementById('content');

content.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});
content.addEventListener('dragleave', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
});
content.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
        loadFile(e.dataTransfer.files[0]);
    }
});

// ── Resize ──
window.addEventListener('resize', () => {
    if (flightData) {
        const container = document.getElementById('plotContainer');
        Plotly.Plots.resize(container);
    }
});
</script>
</body>
</html>
